    const state = {
      tab: "portfolio",

      selectedHoldingId: "",

      reportText: "",

    // ===== IndexedDB =====
    function initDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          STORES.forEach((storeName) => {
            if (!db.objectStoreNames.contains(storeName)) {
              db.createObjectStore(storeName, { keyPath: "id" });
            }
          });
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function getAll(storeName) {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, "readonly");
        const store = tx.objectStore(storeName);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result || []);
        request.onerror = () => reject(request.error);
      });
    }

    async function putItem(storeName, item) {
      const db = await initDB();
      const now = new Date().toISOString();
      const record = {
        ...item,
        id: item.id || crypto.randomUUID(),
        updatedAt: now,
        createdAt: item.createdAt || now
      };

      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).put(record);
        tx.oncomplete = () => resolve(record);
        tx.onerror = () => reject(tx.error);
      });
    }

    async function deleteItem(storeName, id) {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function exportAllData() {
      const data = {};
      for (const storeName of STORES) {
        data[storeName] = await getAll(storeName);
      }
      return {
        app: "InvestmentAiNoteSingle",
        dbName: DB_NAME,
        exportedAt: new Date().toISOString(),
        data
      };
    }

    async function importAllData(backup) {
      if (!backup || !backup.data) {
        throw new Error("バックアップ形式が正しくありません。");
      }

      for (const [storeName, records] of Object.entries(backup.data)) {
        if (!STORES.includes(storeName) || !Array.isArray(records)) continue;
        for (const record of records) {
          if (record && record.id) {
            await putItem(storeName, record);
          }
        }
      }
    }

    async function requestPersistentStorage() {
      if (!navigator.storage || !navigator.storage.persist) {
        state.storageStatus = "このブラウザでは持続的ストレージ申請に対応していません。";
        return false;
      }

      try {
        const result = await navigator.storage.persist();
        state.storageStatus = result
          ? "持続的ストレージ：有効"
          : "持続的ストレージ：未許可（バックアップを定期的に作成してください）";
        return result;
      } catch (error) {
        state.storageStatus = "持続的ストレージ申請でエラーが発生しました。";
        return false;
      }
    }

    // ===== 計算 =====
    function toNumber(value) {
      if (value === null || value === undefined || value === "") return 0;
      const normalized = String(value)
        .replace(/[円,%％株\s]/g, "")
        .replace(/,/g, "")
        .replace("▲", "-");
      const num = Number(normalized);
      return Number.isFinite(num) ? num : 0;
    }

    function calcHolding(raw) {
      const shares = toNumber(raw.shares);
      const averageCost = toNumber(raw.averageCost);
      const currentPrice = toNumber(raw.currentPrice);
      const expectedDividendPerShare = toNumber(raw.expectedDividendPerShare);

      const acquisitionAmount = shares * averageCost;
      const marketValue = shares * currentPrice;
      const unrealizedGainLoss = marketValue - acquisitionAmount;
      const gainLossRate = acquisitionAmount ? (unrealizedGainLoss / acquisitionAmount) * 100 : 0;
      const annualDividend = shares * expectedDividendPerShare;
      const dividendYield = currentPrice ? (expectedDividendPerShare / currentPrice) * 100 : 0;

      return {
        ...raw,
        shares,
        averageCost,
        currentPrice,
        expectedDividendPerShare,
        acquisitionAmount,
        marketValue,
        unrealizedGainLoss,
        gainLossRate,
        annualDividend,
        dividendYield
      };
    }

    function calcPortfolioSummary(holdings) {
      const totalCost = holdings.reduce((sum, h) => sum + toNumber(h.acquisitionAmount), 0);
      const totalValue = holdings.reduce((sum, h) => sum + toNumber(h.marketValue), 0);
      const totalGainLoss = totalValue - totalCost;
      const totalGainLossRate = totalCost ? (totalGainLoss / totalCost) * 100 : 0;
      const annualDividend = holdings.reduce((sum, h) => sum + toNumber(h.annualDividend), 0);
      const portfolioDividendYield = totalValue ? (annualDividend / totalValue) * 100 : 0;

      return {
        totalCost,
        totalValue,
        totalGainLoss,
        totalGainLossRate,
        annualDividend,
        portfolioDividendYield
      };
    }

    function yen(value) {
      return `${Math.round(toNumber(value)).toLocaleString("ja-JP")}円`;
    }

    function pct(value) {
      return `${toNumber(value).toFixed(2)}%`;

    // ===== CSV =====

    function parseCsvLine(line) {
      const values = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          values.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      values.push(current);
      return values;
    }

    function parseCsv(text) {
      const normalized = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      const lines = normalized.split("\n").filter((line) => line.trim() !== "");
      if (!lines.length) return [];

      const headers = parseCsvLine(lines[0]).map((h) => h.trim());
      return lines.slice(1).map((line) => {
        const values = parseCsvLine(line);
        const row = {};
        headers.forEach((header, index) => {
          row[header] = values[index] || "";
        });
        return row;
      }).filter((row) => {
        const joined = Object.values(row).join("");
        return joined && !joined.includes("合計") && !joined.includes("総合計");
      });
    }

    function findColumn(row, aliases) {
      const keys = Object.keys(row);
      return keys.find((key) => aliases.includes(key));
    }

    function mapCsvRowsToHoldings(rows, fileName = "portfolio.csv", broker = "汎用CSV") {
      return rows.map((row) => {
        const mapped = {};

        for (const [field, aliases] of Object.entries(COLUMN_ALIASES)) {
          const column = findColumn(row, aliases);
          mapped[field] = column ? row[column] : "";
        }

        const code = String(mapped.code || "").trim();
        const accountType = String(mapped.accountType || "未設定").trim();

        return calcHolding({
          id: `holding_${code || crypto.randomUUID()}_${accountType}`,
          code,
          name: String(mapped.name || "").trim(),
          sector: String(mapped.sector || "").trim(),
          accountType,
          shares: mapped.shares,
          averageCost: mapped.averageCost,
          currentPrice: mapped.currentPrice,
          expectedDividendPerShare: mapped.expectedDividendPerShare,
          purpose: "",
          reasonForHolding: "",
          sellConditions: "",
          nextCheckPoints: "",
          memo: "",
          source: {
            type: "csv",
            importedAt: new Date().toISOString(),
            fileName,
            broker
          }
        });
      });
    }

    async function readCsvFile(file) {
      const text = await file.text();
      return parseCsv(text);
    }

    // ===== プロンプト =====
    function buildProfileText() {
      const p = state.profile;
      return `
投資目的：${p.purpose}
投資期間：${p.period}
リスク許容度：${p.riskTolerance}
重視すること：${p.focus}
避けたいこと：${p.avoid}
`.trim();
    }

    function formatHoldingForPrompt(h) {
      if (!h) return "対象銘柄が選択されていません。";
      return `
銘柄コード：${h.code}
企業名：${h.name}
業種：${h.sector}
口座区分：${h.accountType}
保有株数：${h.shares}
平均取得単価：${h.averageCost}
現在株価：${h.currentPrice}
評価額：${yen(h.marketValue)}
評価損益：${yen(h.unrealizedGainLoss)}
損益率：${pct(h.gainLossRate)}
予想1株配当：${h.expectedDividendPerShare}
配当利回り：${pct(h.dividendYield)}
保有目的：${h.purpose}
保有理由：${h.reasonForHolding}
売却条件：${h.sellConditions}
次回確認事項：${h.nextCheckPoints}
メモ：${h.memo}
`.trim();
    }

    function formatPortfolioForPrompt(holdings, summary) {
      const rows = holdings.map((h, index) => `
${index + 1}. 銘柄コード：${h.code}
   企業名：${h.name}
   業種：${h.sector}
   口座区分：${h.accountType}
   保有株数：${h.shares}
   平均取得単価：${h.averageCost}
   現在株価：${h.currentPrice}
   評価額：${yen(h.marketValue)}
   評価損益：${yen(h.unrealizedGainLoss)}
   損益率：${pct(h.gainLossRate)}
   配当利回り：${pct(h.dividendYield)}
   保有目的：${h.purpose}
`).join("\n");

      return `
投資元本：${yen(summary.totalCost)}
評価額：${yen(summary.totalValue)}
評価損益：${yen(summary.totalGainLoss)}
損益率：${pct(summary.totalGainLossRate)}
年間配当予定額：${yen(summary.annualDividend)}
ポートフォリオ配当利回り：${pct(summary.portfolioDividendYield)}

【保有銘柄一覧】
${rows || "保有銘柄なし"}
`.trim();
    }

    // ===== UI =====
    const tabs = [
      ["portfolio", "ポートフォリオ"],
      ["csv", "CSV取り込み"],
      ["prompt", "AI相談プロンプト"],
      ["glossary", "投資用語辞書"],
      ["profile", "投資方針"],
      ["backup", "バックアップ"]
    ];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderTabs() {
      document.getElementById("tabs").innerHTML = tabs.map(([id, label]) => `
        <button class="${state.tab === id ? "active" : ""}" onclick="switchTab('${id}')">${label}</button>
      `).join("");
    }

    function switchTab(tab) {
      state.tab = tab;
      render();
    }

    function render() {
      renderTabs();
      const main = document.getElementById("main");

      if (state.tab === "portfolio") main.innerHTML = renderPortfolio();
      if (state.tab === "csv") main.innerHTML = renderCsv();
      if (state.tab === "prompt") main.innerHTML = renderPrompt();
      if (state.tab === "glossary") main.innerHTML = renderGlossary();
      if (state.tab === "profile") main.innerHTML = renderProfile();
      if (state.tab === "backup") main.innerHTML = renderBackup();

      bindEvents();
    }

    function renderPortfolio() {
      const summary = calcPortfolioSummary(state.holdings);
      return `
        <section class="card">
          <h2>ポートフォリオ</h2>
          <p class="notice">${escapeHtml(state.storageStatus || "ブラウザ内にデータを保存します。定期的にバックアップしてください。")}</p>

          <div class="summary">
            <div>投資元本<br><strong>${yen(summary.totalCost)}</strong></div>
            <div>評価額<br><strong>${yen(summary.totalValue)}</strong></div>
            <div>評価損益<br><strong>${yen(summary.totalGainLoss)}（${pct(summary.totalGainLossRate)}）</strong></div>
            <div>年間配当<br><strong>${yen(summary.annualDividend)}</strong></div>
            <div>配当利回り<br><strong>${pct(summary.portfolioDividendYield)}</strong></div>
          </div>

          <h3>保有銘柄を追加</h3>
          <div class="grid">
            ${Object.keys(emptyHolding).map((key) => `
              <label>${key}
                <input data-holding-field="${key}" value="${escapeHtml(state.holdingForm[key] || "")}">
              </label>
            `).join("")}
          </div>
          <button id="saveHoldingBtn">保存</button>

          <h3>保有銘柄一覧</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>コード</th>
                  <th>企業名</th>
                  <th>口座</th>
                  <th>株数</th>
                  <th>取得単価</th>
                  <th>現在株価</th>
                  <th>評価損益</th>
                  <th>利回り</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                ${state.holdings.map((h) => `
                  <tr>
                    <td>${escapeHtml(h.code)}</td>
                    <td>${escapeHtml(h.name)}</td>
                    <td>${escapeHtml(h.accountType)}</td>
                    <td>${escapeHtml(h.shares)}</td>
                    <td>${escapeHtml(h.averageCost)}</td>
                    <td>${escapeHtml(h.currentPrice)}</td>
                    <td>${yen(h.unrealizedGainLoss)} / ${pct(h.gainLossRate)}</td>
                    <td>${pct(h.dividendYield)}</td>
                    <td>
                      <div class="row-actions">
                        <button class="secondary" onclick="editHolding('${h.id}')">編集</button>
                        <button class="danger" onclick="removeHolding('${h.id}')">削除</button>
                      </div>
                    </td>
                  </tr>
                `).join("") || `<tr><td colspan="9">まだ保有銘柄がありません。</td></tr>`}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderCsv() {
      return `
        <section class="card">
          <h2>証券アプリCSV取り込み</h2>
          <p class="muted">CSVの列名が「銘柄コード」「銘柄名」「保有数量」「平均取得価額」「現在値」などに近い形式であれば、自動で対応します。</p>
          <p class="notice">単一HTML版ではブラウザ標準機能でCSVを読み込みます。文字化けする場合は、CSVをUTF-8で保存し直してから取り込んでください。</p>

          <input id="csvFileInput" type="file" accept=".csv,text/csv">
          <button id="importCsvBtn" ${state.csvPreview.length ? "" : "disabled"}>取り込み実行</button>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>コード</th>
                  <th>企業名</th>
                  <th>株数</th>
                  <th>取得単価</th>
                  <th>現在株価</th>
                  <th>評価額</th>
                </tr>
              </thead>
              <tbody>
                ${state.csvPreview.map((h) => `
                  <tr>
                    <td>${escapeHtml(h.code)}</td>
                    <td>${escapeHtml(h.name)}</td>
                    <td>${escapeHtml(h.shares)}</td>
                    <td>${escapeHtml(h.averageCost)}</td>
                    <td>${escapeHtml(h.currentPrice)}</td>
                    <td>${yen(h.marketValue)}</td>
                  </tr>
                `).join("") || `<tr><td colspan="6">CSVを選択するとプレビューが表示されます。</td></tr>`}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderPrompt() {
      const selectedHolding = state.holdings.find((h) => h.id === state.selectedHoldingId) || state.holdings[0];

      return `
        <section class="card">
          <h2>目的別AI相談プロンプト</h2>

          <label>テンプレート
            <select id="selectedTemplateId">
              ${PROMPT_TEMPLATES.map((t) => `
                <option value="${t.id}" ${state.selectedTemplateId === t.id ? "selected" : ""}>${escapeHtml(t.category)}：${escapeHtml(t.name)}</option>
              `).join("")}
            </select>
          </label>

          <label>対象銘柄
            <select id="selectedHoldingId">
              ${state.holdings.map((h) => `
                <option value="${h.id}" ${(selectedHolding && selectedHolding.id === h.id) ? "selected" : ""}>${escapeHtml(h.code)} ${escapeHtml(h.name)}</option>
              `).join("")}
            </select>
          </label>

          <label>決算メモ・資料テキスト
            <textarea id="reportText">${escapeHtml(state.reportText)}</textarea>
          </label>

          <label>投資用語
            <input id="glossaryTermPrompt" value="${escapeHtml(state.glossaryTerm)}" placeholder="例：ROE">
          </label>

          <button id="generatePromptBtn">プロンプト生成</button>
          <button id="copyPromptBtn" class="secondary">コピー</button>

          <label>生成プロンプト
            <textarea id="generatedPrompt" class="large">${escapeHtml(state.generatedPrompt)}</textarea>
          </label>

          <h3>AI回答を保存</h3>
          <label>外部AIの回答
            <textarea id="aiResponse">${escapeHtml(state.aiResponse)}</textarea>
          </label>

          <label>自分の判断メモ
            <textarea id="decisionMemo">${escapeHtml(state.decisionMemo)}</textarea>
          </label>

          <button id="saveAiResponseBtn">AI回答と判断メモを保存</button>
        </section>
      `;
    }

    function renderGlossary() {
      const term = state.glossaryTerm || "";
      const items = DEFAULT_GLOSSARY.filter((g) =>
        !term ||
        g.term.includes(term) ||
        g.category.includes(term) ||
        g.reading.includes(term)
      );

      return `
        <section class="card">
          <h2>投資用語辞書</h2>
          <input id="glossarySearch" placeholder="用語検索" value="${escapeHtml(term)}">

          <div class="glossary">
            ${items.map((g) => `
              <article>
                <h3>${escapeHtml(g.term)}</h3>
                <p><strong>読み：</strong>${escapeHtml(g.reading)}</p>
                <p><strong>カテゴリ：</strong>${escapeHtml(g.category)}</p>
                <p><strong>ひとことで：</strong>${escapeHtml(g.shortDescription)}</p>
                <p><strong>計算式：</strong>${escapeHtml(g.formula)}</p>
                <p><strong>見方：</strong>${escapeHtml(g.howToRead)}</p>
                <p><strong>注意点：</strong>${escapeHtml(g.caution)}</p>
                <p><strong>資料で見る場所：</strong>${escapeHtml(g.whereToFind)}</p>
              </article>
            `).join("") || `<p>該当する用語がありません。</p>`}
          </div>
        </section>
      `;
    }

    function renderProfile() {
      return `
        <section class="card">
          <h2>投資方針プロフィール</h2>
          ${["purpose", "period", "riskTolerance", "focus", "avoid"].map((key) => `
            <label>${key}
              <input data-profile-field="${key}" value="${escapeHtml(state.profile[key] || "")}">
            </label>
          `).join("")}
          <button id="saveProfileBtn">保存</button>
        </section>
      `;
    }

    function renderBackup() {
      return `
        <section class="card">
          <h2>バックアップ / 復元</h2>
          <p class="notice">ブラウザ保存は消える可能性があるため、定期的にJSONバックアップを作成してください。</p>
          <button id="backupBtn">JSONを書き出し</button>
          <label>JSONを読み込み
            <input id="restoreInput" type="file" accept="application/json">
          </label>

          <h3>保存情報</h3>
          <ul>
            <li>DB名：<code>${escapeHtml(DB_NAME)}</code></li>
            <li>環境識別子：<code>${escapeHtml(ENV_SUFFIX)}</code></li>
            <li>${escapeHtml(state.storageStatus || "持続的ストレージ申請は起動時に実行されます。")}</li>
          </ul>
        </section>
      `;
    }

    function bindEvents() {
      document.querySelectorAll("[data-holding-field]").forEach((input) => {
        input.addEventListener("input", (event) => {
          state.holdingForm[event.target.dataset.holdingField] = event.target.value;
        });
      });

      document.querySelectorAll("[data-profile-field]").forEach((input) => {
        input.addEventListener("input", (event) => {
          state.profile[event.target.dataset.profileField] = event.target.value;
        });
      });

      const saveHoldingBtn = document.getElementById("saveHoldingBtn");
      if (saveHoldingBtn) {
        saveHoldingBtn.addEventListener("click", saveHolding);
      }

      const csvFileInput = document.getElementById("csvFileInput");
      if (csvFileInput) {
        csvFileInput.addEventListener("change", handleCsvFile);
      }

      const importCsvBtn = document.getElementById("importCsvBtn");
      if (importCsvBtn) {
        importCsvBtn.addEventListener("click", importCsvPreview);
      }

      const selectedTemplateId = document.getElementById("selectedTemplateId");
      if (selectedTemplateId) {
        selectedTemplateId.addEventListener("change", (event) => {
          state.selectedTemplateId = event.target.value;
        });
      }

      const selectedHoldingId = document.getElementById("selectedHoldingId");
      if (selectedHoldingId) {
        selectedHoldingId.addEventListener("change", (event) => {
          state.selectedHoldingId = event.target.value;
        });
      }

      const reportText = document.getElementById("reportText");
      if (reportText) {
        reportText.addEventListener("input", (event) => {
          state.reportText = event.target.value;
        });
      }

      const glossaryTermPrompt = document.getElementById("glossaryTermPrompt");
      if (glossaryTermPrompt) {
        glossaryTermPrompt.addEventListener("input", (event) => {
          state.glossaryTerm = event.target.value;
        });
      }

      const generatedPrompt = document.getElementById("generatedPrompt");
      if (generatedPrompt) {
        generatedPrompt.addEventListener("input", (event) => {
          state.generatedPrompt = event.target.value;
        });
      }

      const aiResponse = document.getElementById("aiResponse");
      if (aiResponse) {
        aiResponse.addEventListener("input", (event) => {
          state.aiResponse = event.target.value;
        });
      }

      const decisionMemo = document.getElementById("decisionMemo");
      if (decisionMemo) {
        decisionMemo.addEventListener("input", (event) => {
          state.decisionMemo = event.target.value;
        });
      }

      const generatePromptBtn = document.getElementById("generatePromptBtn");
      if (generatePromptBtn) {
        generatePromptBtn.addEventListener("click", generatePrompt);
      }

      const copyPromptBtn = document.getElementById("copyPromptBtn");
      if (copyPromptBtn) {
        copyPromptBtn.addEventListener("click", copyPrompt);
      }

      const saveAiResponseBtn = document.getElementById("saveAiResponseBtn");
      if (saveAiResponseBtn) {
        saveAiResponseBtn.addEventListener("click", saveAiResponse);
      }

      const glossarySearch = document.getElementById("glossarySearch");
      if (glossarySearch) {
        glossarySearch.addEventListener("input", (event) => {
          state.glossaryTerm = event.target.value;
          render();
        });
      }

      const saveProfileBtn = document.getElementById("saveProfileBtn");
      if (saveProfileBtn) {
        saveProfileBtn.addEventListener("click", saveProfile);
      }

      const backupBtn = document.getElementById("backupBtn");
      if (backupBtn) {
        backupBtn.addEventListener("click", backup);
      }

      const restoreInput = document.getElementById("restoreInput");
      if (restoreInput) {
        restoreInput.addEventListener("change", restore);
      }
    }

    // ===== 操作 =====
    async function saveHolding() {
      const record = await putItem("holdings", calcHolding(state.holdingForm));
      state.holdings = [
        ...state.holdings.filter((h) => h.id !== record.id),
        record
      ];
      state.holdingForm = { ...emptyHolding };
      render();
    }

    function editHolding(id) {
      const target = state.holdings.find((h) => h.id === id);
      if (!target) return;
      state.holdingForm = { ...emptyHolding, ...target };
      window.scrollTo({ top: 0, behavior: "smooth" });
      render();
    }

    async function removeHolding(id) {
      if (!confirm("この銘柄を削除しますか？")) return;
      await deleteItem("holdings", id);
      state.holdings = state.holdings.filter((h) => h.id !== id);
      render();
    }

    async function handleCsvFile(event) {
      const file = event.target.files[0];
      if (!file) return;

      const rows = await readCsvFile(file);
      state.csvPreview = mapCsvRowsToHoldings(rows, file.name);
      render();
    }

    async function importCsvPreview() {
      for (const h of state.csvPreview) {
        await putItem("holdings", h);
      }

      await putItem("importHistory", {
        id: crypto.randomUUID(),
        importedAt: new Date().toISOString(),
        rowCount: state.csvPreview.length,
        importedCount: state.csvPreview.length
      });

      state.holdings = await getAll("holdings");
      state.csvPreview = [];
      alert("CSVを取り込みました。");
      render();
    }

    function generatePrompt() {
      const summary = calcPortfolioSummary(state.holdings);
      const selectedHolding =
        state.holdings.find((h) => h.id === state.selectedHoldingId) ||
        state.holdings[0];

      const template = PROMPT_TEMPLATES.find((t) => t.id === state.selectedTemplateId);
      if (!template) return;

      state.generatedPrompt = template.build({
        profileText: buildProfileText(),
        portfolioText: formatPortfolioForPrompt(state.holdings, summary),
        selectedHoldingText: formatHoldingForPrompt(selectedHolding),
        reportText: state.reportText,
        glossaryTerm: state.glossaryTerm
      });

      render();
    }

    async function copyPrompt() {
      if (!state.generatedPrompt) return;
      try {
        await navigator.clipboard.writeText(state.generatedPrompt);
        alert("コピーしました。");
      } catch {
        const textArea = document.createElement("textarea");
        textArea.value = state.generatedPrompt;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("copy");
        document.body.removeChild(textArea);
        alert("コピーしました。");
      }
    }

    async function saveAiResponse() {
      await putItem("aiResponses", {
        id: crypto.randomUUID(),
        date: new Date().toISOString(),
        templateId: state.selectedTemplateId,
        prompt: state.generatedPrompt,
        response: state.aiResponse,
        decisionMemo: state.decisionMemo
      });

      state.aiResponse = "";
      state.decisionMemo = "";
      alert("AI回答と判断メモを保存しました。");
      render();
    }

    async function saveProfile() {
      const saved = await putItem("profile", { ...state.profile, id: "main" });
      state.profile = saved;
      alert("投資方針プロフィールを保存しました。");
      render();
    }

    async function backup() {
      const data = await exportAllData();
      const text = JSON.stringify(data, null, 2);
      const blob = new Blob([text], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const date = new Date().toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).replaceAll("/", "");
      const a = document.createElement("a");
      a.href = url;
      a.download = `InvestmentAiNote_Backup_${date}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function restore(event) {
      const file = event.target.files[0];
      if (!file) return;

      try {
        const text = await file.text();
        await importAllData(JSON.parse(text));
        await loadInitialData();
        alert("バックアップを読み込みました。");
        render();
      } catch (error) {
        alert("読み込みに失敗しました。バックアップファイルを確認してください。");
      }
    }

    async function loadInitialData() {
      state.holdings = await getAll("holdings");
      const profiles = await getAll("profile");
      state.profile = profiles[0] || { ...defaultProfile };
    }

    async function boot() {
      render();
      await requestPersistentStorage();
      await loadInitialData();
      render();
    }

    boot();
  </script>
</body>

<script>
/* ========== 環境設定（試験用は _TEST に変更） ========== */
const ENV_SUFFIX = '_PROD';
const DB_NAME = `StockAdvisorDB${ENV_SUFFIX}`;
const DB_VERSION = 3;
const STORES = ['apiKeys','watchlist','portfolio','cache_financials','cache_prices','ai_memos','cache_master','external_history'];
document.getElementById('envBadge').textContent = `env: ${ENV_SUFFIX}`;

/* ========== IndexedDB ========== */
let _db;
function openDB(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      STORES.forEach(s => { if(!db.objectStoreNames.contains(s)) db.createObjectStore(s); });
    };
    req.onsuccess = () => { _db = req.result; res(_db); };
    req.onerror = () => rej(req.error);
  });
}
async function put(store, key, val){
  const db = _db || await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).put(val, key);
    tx.oncomplete = res; tx.onerror = ()=>rej(tx.error);
  });
}
async function get(store, key){
  const db = _db || await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readonly');
    const r = tx.objectStore(store).get(key);
    r.onsuccess = ()=>res(r.result); r.onerror = ()=>rej(r.error);
  });
}
async function getAll(store){
  const db = _db || await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readonly');
    const r = tx.objectStore(store).getAll();
    const k = tx.objectStore(store).getAllKeys();
    r.onsuccess = ()=>{ k.onsuccess = ()=>res({keys:k.result, values:r.result}); };
    r.onerror = ()=>rej(r.error);
  });
}
async function del(store, key){
  const db = _db || await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = res; tx.onerror = ()=>rej(tx.error);
  });
}

/* ========== 永続化申請 ========== */
async function requestPersist(){
  if(navigator.storage?.persist){
    try { return await navigator.storage.persist(); } catch(e){ return false; }
  }
  return false;
}

/* ========== J-Quants API V2（GAS プロキシ経由 / CORS回避） ========== */
async function jqFetch(path){
  const apiKey = await get('apiKeys','jquants');
  const proxyUrl = await get('apiKeys','jquantsProxy');
  if(!apiKey) throw new Error('J-Quants APIキー未設定。⚙️設定タブで登録してください。');
  if(!proxyUrl) throw new Error('J-Quantsプロキシ未設定。⚙️設定タブで GAS Web App のURLを登録してください。');
  const r = await fetch(proxyUrl, {
    method:'POST',
    body: JSON.stringify({ path, apiKey })
  });
  if(!r.ok) throw new Error(`プロキシ通信エラー: ${r.status}`);
  const j = await r.json();
  if(j.error) throw new Error(`プロキシ: ${j.error}`);
  if(j.status >= 400) throw new Error(`J-Quants APIエラー: ${j.status} ${(j.body||'').slice(0,160)}`);
  return JSON.parse(j.body);
}

/* ========== J-Quants ページング一括取得 ========== */
async function jqFetchAll(path){
  let all = [];
  let pgKey = null;
  for(let i = 0; i < 30; i++){
    const sep = path.includes('?') ? '&' : '?';
    const url = pgKey ? `${path}${sep}pagination_key=${encodeURIComponent(pgKey)}` : path;
    const res = await jqFetch(url);
    const chunk = res.data || res.info || [];
    all = all.concat(chunk);
    pgKey = res.pagination_key || null;
    if(!pgKey) break;
  }
  return { data: all };
}

/* ========== Stooq 株価（GAS プロキシ経由） ========== */
async function stooqLatest(code){
  const proxyUrl = await get('apiKeys','jquantsProxy');
  if(!proxyUrl) throw new Error('プロキシ未設定。⚙️設定タブで GAS Web App のURLを登録してください。');
  // 例：7203 → 7203.jp
  const stooqUrl = `https://stooq.com/q/d/l/?s=${code}.jp&i=d`;
  const r = await fetch(proxyUrl, {
    method:'POST',
    body: JSON.stringify({ url: stooqUrl })
  });
  if(!r.ok) throw new Error(`プロキシ通信エラー（Stooq）: ${r.status}`);
  const j = await r.json();
  if(j.error) throw new Error(`プロキシ（Stooq）: ${j.error}`);
  if(j.status >= 400) throw new Error(`Stooqエラー: ${j.status}`);
  const text = j.body || '';
  const lines = text.trim().split(/\r?\n/);
  if(lines.length < 2) return null;
  const last = lines[lines.length-1].split(',');
  return { date: last[0], close: parseFloat(last[4]) };
}

/* ========== 銘柄マスタ（コード↔名称） ========== */
async function loadIssueMaster(force=false){
  const cache = await get('cache_master', 'all');
  const ONE_MONTH = 30*24*60*60*1000;
  if(!force && cache && (Date.now() - (cache.at||0)) < ONE_MONTH){
    return cache.items || [];
  }
  const res = await jqFetchAll('/equities/master');
  const raw = res.data || res.info || [];
  const items = raw.map(x => {
    const c = String(x.Code || x.code || '');
    return {
      code:  c.length === 5 ? c.slice(0,4) : c,
      code5: c.length === 4 ? c + '0' : c,
      name: x.CompanyName || x.Name || x.CompanyNameJP || x.CompanyNameJapanese || '',
      nameEn: x.CompanyNameEnglish || x.NameEn || '',
      sector: x.Sector17CodeName || x.Sector33CodeName || x.SectorName || ''
    };
  }).filter(x => x.code && x.name);
  await put('cache_master', 'all', { items, at: Date.now() });
  return items;
}
function searchIssues(items, query){
  const q = (query||'').trim();
  if(!q || !items) return [];
  if(/^\d+$/.test(q)){
    return items.filter(x => x.code.startsWith(q) || x.code5.startsWith(q)).slice(0,20);
  }
  const lower = q.toLowerCase();
  return items.filter(x =>
    x.name.toLowerCase().includes(lower) ||
    (x.nameEn||'').toLowerCase().includes(lower)
  ).slice(0,20);
}

/* ========== 指標計算 ========== */
function calcHealthScore({利回り, 配当性向, 自己資本比率, 連続増配年, CF配当カバー}){
  let s = 0;
  // 配当の魅力度 30
  s += Math.min(30, (利回り ?? 0) * 6);
  // 配当の持続性 40
  if(配当性向 != null) s += Math.max(0, 25 - Math.max(0, 配当性向 - 50) * 0.5);
  if(CF配当カバー != null) s += Math.min(15, CF配当カバー * 7);
  // 収益安定性 20（自己資本比率で代用）
  if(自己資本比率 != null) s += Math.min(20, 自己資本比率 * 0.4);
  // 増配履歴 10
  s += Math.min(10, (連続増配年 ?? 0) * 2);
  return Math.round(Math.max(0, Math.min(100, s)));
}
function riskFlags(metrics){
  const flags = [];
  if(metrics.配当性向 > 80) flags.push('🔴 配当性向80%超');
  if(metrics.CF配当カバー != null && metrics.CF配当カバー < 1) flags.push('🟠 配当 > 営業CF');
  if(metrics.自己資本比率 != null && metrics.自己資本比率 < 30) flags.push('🟡 自己資本比率30%未満');
  if(metrics.連続増配年 === 0) flags.push('🟡 増配履歴なし');
  return flags;
}

/* ========== 銘柄分析 ========== */
async function analyzeStock(code){
  const code5 = code.length===4 ? code+'0' : code;
  // V2: /fins/statements → /fins/summary
  const fins = await jqFetchAll(`/fins/summary?code=${code5}`);
  const price = await stooqLatest(code);
  await put('cache_financials', code, {data:fins, at:Date.now()});
  if(price) await put('cache_prices', code, {...price, at:Date.now()});

  // V2: レスポンスは data 配列、年次は CurPerType === 'FY' で絞り込み
  const all = fins.data || [];
  const stmts = all.filter(x => x.CurPerType === 'FY');
  const latest = stmts[stmts.length-1] || all[all.length-1] || {};
  const eps = parseFloat(latest.EPS) || null;
  const bps = parseFloat(latest.BPS) || null;
  const dps = parseFloat(latest.DivAnn) || null;
  const opCF = parseFloat(latest.CFO) || null;
  // EqAR は小数（0.45 → 45%）
  const equityRatio = parseFloat(latest.EqAR) ? parseFloat(latest.EqAR)*100 : null;

  const close = price?.close;
  const per = (close && eps) ? close/eps : null;
  const pbr = (close && bps) ? close/bps : null;
  const yieldPct = (close && dps) ? dps/close*100 : null;

  // 配当性向：V2 は PayoutRatioAnn が直接提供される
  const netIncome = parseFloat(latest.NP) || null;
  const totalDiv = parseFloat(latest.DivTotalAnn) || null;
  const payoutDirect = parseFloat(latest.PayoutRatioAnn);
  const payout = !isNaN(payoutDirect) && payoutDirect>0 ? payoutDirect*100
              : (netIncome && totalDiv) ? totalDiv/netIncome*100
              : null;
  const cfCover = (opCF && totalDiv) ? opCF/totalDiv : null;

  // 年次配当・配当性向・自己株式の履歴を構築
  const yearlyAll = {};
  const payoutAll = {};
  const treasuryAll = {};
  const sharesOutAll = {};
  const firstNum = (obj, keys) => {
    for(const k of keys){
      const n = parseFloat(obj?.[k]);
      if(!isNaN(n)) return n;
    }
    return null;
  };
  stmts.forEach(s => {
    const y = (s.CurFYEn||'').slice(0,4);
    if(!y) return;
    const ann = parseFloat(s.DivAnn);
    if(!isNaN(ann)) yearlyAll[y] = ann;
    const prDirect = parseFloat(s.PayoutRatioAnn);
    if(!isNaN(prDirect) && prDirect > 0){
      payoutAll[y] = prDirect * 100;
    } else {
      const ni = parseFloat(s.NP);
      const td = parseFloat(s.DivTotalAnn);
      if(!isNaN(ni) && !isNaN(td) && ni > 0) payoutAll[y] = td/ni*100;
    }
    const tr = firstNum(s, ['TrShFY','TreasuryShares','TreasuryStock','NumberOfTreasuryStockAtTheEndOfFiscalYear']);
    const sh = firstNum(s, ['ShOutFY','IssuedShares','SharesOutstanding','TotalNumberOfIssuedSharesAtTheEndOfFiscalYear']);
    if(tr != null) treasuryAll[y] = tr;
    if(sh != null) sharesOutAll[y] = sh;
  });
  // 外部CSV・AI抽出で補完した配当・配当性向・自己株式をマージ（同じ年度は補完データを優先）
  const external = await loadExternalHistory(code);
  Object.keys(external.yearlyDiv || {}).forEach(y => { yearlyAll[y] = external.yearlyDiv[y]; });
  Object.keys(external.payoutHist || {}).forEach(y => { payoutAll[y] = external.payoutHist[y]; });
  Object.keys(external.treasuryHist || {}).forEach(y => { treasuryAll[y] = external.treasuryHist[y]; });
  Object.keys(external.sharesOutHist || {}).forEach(y => { sharesOutAll[y] = external.sharesOutHist[y]; });

  // 取得できた範囲から最大10年に絞り込み（無料プランは2年分のみ。外部CSV補完があれば10年表示可）
  const allYears = Array.from(new Set([...Object.keys(yearlyAll), ...Object.keys(treasuryAll)])).sort();
  const last10 = allYears.slice(-10);
  const yearlyDiv = {}; const payoutHist = {}; const treasuryHist = {}; const buybackHist = {}; const treasuryRatioHist = {};
  last10.forEach((y, idx) => {
    if(yearlyAll[y] != null) yearlyDiv[y] = yearlyAll[y];
    if(payoutAll[y] != null) payoutHist[y] = payoutAll[y];
    if(treasuryAll[y] != null) treasuryHist[y] = treasuryAll[y];
    if(treasuryAll[y] != null && sharesOutAll[y] != null && sharesOutAll[y] > 0) treasuryRatioHist[y] = treasuryAll[y] / sharesOutAll[y] * 100;
    const prev = last10[idx-1];
    if(prev && treasuryAll[y] != null && treasuryAll[prev] != null) buybackHist[y] = treasuryAll[y] - treasuryAll[prev];
  });
  // 連続増配年
  let streak = 0;
  for(let i = last10.length-1; i > 0; i--){
    if(yearlyDiv[last10[i]] > yearlyDiv[last10[i-1]]) streak++; else break;
  }

  // 銘柄名をマスタから補完
  let name = '';
  try {
    const master = await get('cache_master', 'all');
    if(master?.items){
      const hit = master.items.find(x => x.code === code || x.code5 === code5);
      name = hit?.name || '';
    }
  } catch(e){}

  const metrics = {
    code, name, close, per, pbr, 利回り:yieldPct, 配当性向:payout,
    自己資本比率:equityRatio, 連続増配年:streak, CF配当カバー:cfCover, eps, bps, dps,
    yearlyDiv, payoutHist, treasuryHist, buybackHist, treasuryRatioHist
  };
  metrics.score = calcHealthScore(metrics);
  metrics.flags = riskFlags(metrics);
  return metrics;
}

/* ========== 楽天証券CSV ========== */
function parseCSV(text){
  const sep = text.includes('\t') && (text.match(/\t/g)||[]).length > (text.match(/,/g)||[]).length ? '\t' : ',';
  const rows = [];
  let row = [], cur = '', inQuote = false;
  for(let i=0; i<text.length; i++){
    const ch = text[i];
    const next = text[i+1];
    if(ch === '"' && inQuote && next === '"'){ cur += '"'; i++; continue; }
    if(ch === '"'){ inQuote = !inQuote; continue; }
    if(ch === sep && !inQuote){ row.push(cur.trim()); cur = ''; continue; }
    if((ch === '\n' || ch === '\r') && !inQuote){
      if(ch === '\r' && next === '\n') i++;
      row.push(cur.trim()); cur = '';
      if(row.some(v => v !== '')) rows.push(row);
      row = [];
      continue;
    }
    cur += ch;
  }
  row.push(cur.trim());
  if(row.some(v => v !== '')) rows.push(row);
  return rows;
}
function pickDecodedText(buf){
  const sjis = new TextDecoder('shift-jis').decode(buf);
  const utf8 = new TextDecoder('utf-8').decode(buf);
  if(sjis.includes('銘柄') || sjis.includes('保有')) return sjis;
  if(utf8.includes('銘柄') || utf8.includes('保有')) return utf8;
  const badSjis = (sjis.match(/�/g)||[]).length;
  const badUtf8 = (utf8.match(/�/g)||[]).length;
  return badUtf8 < badSjis ? utf8 : sjis;
}
function toNumber(v){
  const s = String(v ?? '').replace(/[",円株口％%\s]/g,'').replace(/,/g,'');
  if(s === '-' || s === '' || s === '---') return null;
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}
function findHeaderIndex(rows){
  return rows.findIndex(r => {
    const line = r.join(',');
    return /コード|銘柄コード|証券コード/.test(line) && /銘柄名|銘柄/.test(line) && /保有数量|保有数|数量/.test(line);
  });
}
function findCol(header, patterns){
  return header.findIndex(h => patterns.some(p => p.test(String(h).replace(/\s/g,''))));
}
function getCol(cols, idx){ return idx >= 0 ? cols[idx] : ''; }
async function importRakutenCSV(file){
  const buf = await file.arrayBuffer();
  const text = pickDecodedText(buf);
  const rows = parseCSV(text).map(r => r.map(s => String(s).replace(/^"|"$/g,'').trim()));
  const headerRow = findHeaderIndex(rows);
  if(headerRow < 0){
    throw new Error('楽天CSVのヘッダー行を見つけられません。楽天証券の保有商品一覧CSV（コード、銘柄名、保有数量、平均取得価額などを含むもの）を選択してください。');
  }
  const header = rows[headerRow];
  const idx = {
    code: findCol(header, [/^コード$/, /銘柄コード/, /証券コード/]),
    name: findCol(header, [/銘柄名/, /^銘柄$/]),
    account: findCol(header, [/口座区分/, /預り区分/]),
    quantity: findCol(header, [/保有数量/, /保有数/, /数量/, /株数/]),
    orderQty: findCol(header, [/発注数量/]),
    cost: findCol(header, [/平均取得価額/, /平均取得単価/, /取得単価/, /取得価額/]),
    marketPrice: findCol(header, [/^時価\(円\)$/, /^時価$/, /現在値/]),
    dayChange: findCol(header, [/前日比\(円\)/, /前日比$/]),
    dayChangePct: findCol(header, [/前日比率/, /前日比.*％/, /前日比.*%/]),
    marketValue: findCol(header, [/時価評価額/, /評価額/]),
    pnl: findCol(header, [/評価損益額/, /評価損益$/]),
    pnlPct: findCol(header, [/評価損益率/]),
    info: findCol(header, [/銘柄情報等/, /銘柄情報/]),
    jaxPrice: findCol(header, [/JAX時価/]),
    jnxPrice: findCol(header, [/JNX時価/]),
    per: findCol(header, [/^PER$/]),
    pbr: findCol(header, [/^PBR$/]),
    dividendYield: findCol(header, [/配当利回り/]),
    fiscalDates: findCol(header, [/決算日/])
  };
  if(idx.code < 0 || idx.quantity < 0 || idx.cost < 0){
    throw new Error(`必要列を判定できません。検出ヘッダー: ${header.join(' / ')}`);
  }
  const items = [];
  for(let i=headerRow+1; i<rows.length; i++){
    const cols = rows[i];
    const code = String(getCol(cols, idx.code) ?? '').replace(/[^0-9A-Za-z]/g,'').slice(0,4);
    if(!code) continue;
    const quantity = toNumber(getCol(cols, idx.quantity)) ?? 0;
    const cost = toNumber(getCol(cols, idx.cost)) ?? 0;
    const marketPrice = toNumber(getCol(cols, idx.marketPrice));
    const marketValue = toNumber(getCol(cols, idx.marketValue));
    const dividendYield = toNumber(getCol(cols, idx.dividendYield));
    items.push({
      code,
      name: getCol(cols, idx.name),
      account: getCol(cols, idx.account),
      quantity,
      orderQty: toNumber(getCol(cols, idx.orderQty)) ?? 0,
      cost,
      marketPrice,
      dayChange: toNumber(getCol(cols, idx.dayChange)),
      dayChangePct: toNumber(getCol(cols, idx.dayChangePct)),
      marketValue: marketValue ?? (marketPrice != null ? marketPrice * quantity : null),
      pnl: toNumber(getCol(cols, idx.pnl)),
      pnlPct: toNumber(getCol(cols, idx.pnlPct)),
      info: getCol(cols, idx.info),
      jaxPrice: toNumber(getCol(cols, idx.jaxPrice)),
      jnxPrice: toNumber(getCol(cols, idx.jnxPrice)),
      per: toNumber(getCol(cols, idx.per)),
      pbr: toNumber(getCol(cols, idx.pbr)),
      dividendYield,
      fiscalDates: getCol(cols, idx.fiscalDates)
    });
  }
  if(!items.length) throw new Error('取り込める銘柄行がありませんでした。CSVの種類を確認してください。');
  for(const it of items) await put('portfolio', it.code, it);
  return items.length;
}

/* ========== 外部CSV・AI：10年分の配当・配当性向補完 ========== */
function normCode(v){ return String(v ?? '').replace(/[^0-9A-Za-z]/g,'').slice(0,4); }
function findExternalHistoryColumns(header){
  return {
    code: findCol(header, [/^コード$/, /銘柄コード/, /証券コード/, /^code$/i]),
    year: findCol(header, [/年度/, /決算期/, /年/, /^year$/i, /fiscal/i]),
    dividend: findCol(header, [/年間配当/, /一株配当/, /配当\(円\)/, /配当金/, /DPS/i, /dividend/i]),
    payout: findCol(header, [/配当性向/, /payout/i])
  };
}
async function loadExternalHistory(code){
  const saved = await get('external_history', normCode(code));
  return saved || { yearlyDiv:{}, payoutHist:{}, treasuryHist:{}, sharesOutHist:{}, aiRows:[], at:null };
}
async function saveExternalHistoryRows(rows){
  const byCode = {};
  rows.forEach(r => {
    const code = normCode(r.code);
    const y = String(r.year || '').match(/\d{4}/)?.[0];
    if(!code || !y) return;
    if(!byCode[code]) byCode[code] = { yearlyDiv:{}, payoutHist:{}, treasuryHist:{}, sharesOutHist:{}, aiRows:[], at:Date.now() };
    const div = toNumber(r.annualDividend ?? r.dividend ?? r.dps);
    const payout = toNumber(r.payoutRatio ?? r.payout);
    const treasury = toNumber(r.treasuryShares);
    const sharesOut = toNumber(r.sharesOutstanding);
    if(div != null) byCode[code].yearlyDiv[y] = div;
    if(payout != null) byCode[code].payoutHist[y] = payout;
    if(treasury != null) byCode[code].treasuryHist[y] = treasury;
    if(sharesOut != null) byCode[code].sharesOutHist[y] = sharesOut;
    byCode[code].aiRows.push({...r, code, year:y});
  });
  const codes = Object.keys(byCode);
  for(const c of codes){
    const prev = await loadExternalHistory(c);
    await put('external_history', c, { yearlyDiv:{...(prev.yearlyDiv||{}), ...byCode[c].yearlyDiv}, payoutHist:{...(prev.payoutHist||{}), ...byCode[c].payoutHist}, treasuryHist:{...(prev.treasuryHist||{}), ...byCode[c].treasuryHist}, sharesOutHist:{...(prev.sharesOutHist||{}), ...byCode[c].sharesOutHist}, aiRows:[...(prev.aiRows||[]), ...byCode[c].aiRows], at:Date.now() });
  }
  return codes.length;
}
async function importExternalHistoryCSV(file){
  const buf = await file.arrayBuffer();
  const text = pickDecodedText(buf);
  const rows = parseCSV(text).map(r => r.map(s => String(s).replace(/^"|"$/g,'').trim()));
  const headerRow = rows.findIndex(r => {
    const line = r.join(',');
    return /コード|銘柄コード|証券コード|code/i.test(line) && /年度|決算期|年|year|fiscal/i.test(line) && /配当|DPS|dividend/i.test(line);
  });
  if(headerRow < 0) throw new Error('外部配当CSVのヘッダー行を見つけられません。列名は「コード,年度,年間配当,配当性向」を推奨します。');
  const header = rows[headerRow];
  const idx = findExternalHistoryColumns(header);
  if(idx.code < 0 || idx.year < 0 || idx.dividend < 0) throw new Error(`必要列を判定できません。検出ヘッダー: ${header.join(' / ')}`);
  const extracted = [];
  for(let i=headerRow+1; i<rows.length; i++){
    const cols = rows[i];
    const code = normCode(getCol(cols, idx.code));
    const yearRaw = String(getCol(cols, idx.year) ?? '');
    const y = (yearRaw.match(/\d{4}/)||[])[0];
    if(!code || !y) continue;
    extracted.push({ code, year:y, annualDividend:toNumber(getCol(cols, idx.dividend)), payoutRatio:idx.payout >= 0 ? toNumber(getCol(cols, idx.payout)) : null, source:'csv' });
  }
  const n = await saveExternalHistoryRows(extracted);
  if(!n) throw new Error('取り込める配当履歴がありませんでした。');
  return n;
}
function stripJsonBlock(s){
  const t = String(s||'').replace(/```json|```/g,'').trim();
  const a = t.indexOf('['), b = t.lastIndexOf(']');
  if(a >= 0 && b > a) return t.slice(a,b+1);
  const c = t.indexOf('{'), d = t.lastIndexOf('}');
  if(c >= 0 && d > c) return '[' + t.slice(c,d+1) + ']';
  return t;
}
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const reader = new FileReader();
    reader.onload = () => res(String(reader.result).split(',')[1]);
    reader.onerror = () => rej(reader.error);
    reader.readAsDataURL(file);
  });
}
async function extractFinanceFromDocument(file, defaultCode){
  const prompt = `あなたは日本企業の決算短信・決算説明資料から投資分析用データを抽出する係です。実績値を優先し、予想値しかない場合は sourceNote に「予想」と明記してください。単位に注意し、株数は株単位、金額は円または百万円など元資料の意味が分かるように sourceNote に残してください。出力はJSON配列のみ。各要素は {"code":"4桁コード","year":"YYYY","annualDividend":年間配当円,"payoutRatio":配当性向パーセント,"eps":EPS円,"bps":BPS円,"equityRatio":自己資本比率パーセント,"operatingCashFlow":営業CF,"netIncome":当期純利益,"totalDividend":配当総額,"treasuryShares":期末自己株式数_株,"sharesOutstanding":期末発行済株式数_株,"sourceNote":"根拠の短い説明","confidence":0から1}。不明項目はnull。銘柄コードが資料から読めない場合は "${normCode(defaultCode)}" を使ってください。`;
  let out;
  if(file.type === 'application/pdf'){
    const b64 = await fileToBase64(file);
    out = await askGeminiParts([{text:prompt},{inline_data:{mime_type:file.type,data:b64}}]);
  } else {
    const buf = await file.arrayBuffer();
    const text = pickDecodedText(buf).slice(0,180000);
    out = await askGemini(`${prompt}\n\n---資料本文---\n${text}`);
  }
  const parsed = JSON.parse(stripJsonBlock(out));
  return Array.isArray(parsed) ? parsed : [parsed];
}

async function importAll(file){

    for(const {key,value} of dump[s]) await put(s, key, value);
  }

}

    const finCache = await get('cache_financials', p.code);
    const stmts = (finCache?.data?.data || []).filter(x=>x.CurPerType === 'FY');
    const latest = stmts[stmts.length-1] || {};
    const dps = parseFloat(latest.DivAnn) || 0;
    const evalAmt = p.marketValue ?? (close ? close * p.quantity : null);
    const costAmt = p.cost * p.quantity;
    const annualDiv = dps * p.quantity;
    const pnl = p.pnl ?? (evalAmt != null ? evalAmt - costAmt : null);
    const pnlPct = p.pnlPct ?? (costAmt ? pnl / costAmt * 100 : null);
    totalCost += costAmt; totalEval += evalAmt||0; totalDiv += annualDiv; totalPnl += pnl||0;
    rows.push({...p, close, evalAmt, costAmt, annualDiv, pnl, pnlPct});
  }
  const fmtMoney = v => v == null ? '—' : Math.round(v).toLocaleString();
  const fmtNum = (v,d=2) => v == null ? '—' : Number(v).toFixed(d);
  const pnlClass = v => v == null ? '' : (v >= 0 ? 'text-emerald-700' : 'text-red-600');
  const bodyRows = rows.map(r=>`<tr class="border-b"><td>${r.code}</td><td>${r.name||''}</td><td>${r.account||''}</td><td class="text-right">${fmtMoney(r.quantity)}</td><td class="text-right">${fmtNum(r.cost,2)}</td><td class="text-right">${fmtNum(r.close,2)}</td><td class="text-right">${fmtMoney(r.evalAmt)}</td><td class="text-right ${pnlClass(r.pnl)}">${fmtMoney(r.pnl)}</td><td class="text-right ${pnlClass(r.pnlPct)}">${fmtNum(r.pnlPct,2)}%</td><td class="text-right">${fmtNum(r.per,2)}</td><td class="text-right">${fmtNum(r.pbr,2)}</td><td class="text-right">${fmtNum(r.dividendYield,2)}%</td><td>${r.fiscalDates||''}</td><td class="text-right">${fmtMoney(r.annualDiv)}</td></tr>`).join('');
  main.innerHTML = `<div class="bg-white rounded p-4 shadow"><h2 class="text-lg font-bold mb-2">💼 ポートフォリオ</h2><div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-3">${kpi('取得額合計', fmtMoney(totalCost)+'円')}${kpi('評価額合計', fmtMoney(totalEval)+'円')}${kpi('評価損益合計', fmtMoney(totalPnl)+'円')}${kpi('年間配当予測', fmtMoney(totalDiv)+'円')}</div><input type="file" id="rakutenCsv" accept=".csv,.tsv,.txt" class="mb-3"><p class="text-xs text-slate-500 mb-3">楽天証券「保有商品一覧」CSVを選択。口座区分・時価・評価損益・PER/PBR・配当利回り・決算日も取り込みます。</p><div class="overflow-x-auto"><table class="w-full text-xs whitespace-nowrap"><thead><tr class="text-left border-b"><th>コード</th><th>銘柄</th><th>口座</th><th class="text-right">保有数量</th><th class="text-right">平均取得</th><th class="text-right">時価</th><th class="text-right">評価額</th><th class="text-right">損益</th><th class="text-right">損益率</th><th class="text-right">PER</th><th class="text-right">PBR</th><th class="text-right">配当利回り</th><th>決算日</th><th class="text-right">年配当予測</th></tr></thead><tbody>${bodyRows}</tbody></table></div></div>`;
  $('#rakutenCsv').addEventListener('change', async e=>{
    const f = e.target.files[0]; if(!f) return;
    try { const n = await importRakutenCSV(f); alert(`${n}件取り込み完了`); renderPortfolioV2(); }
    catch(err){ alert('エラー：'+err.message); }
  });
}

async function renderAiImport(){

    if(!pendingRows.length){ $('#aiImportPreview').innerHTML=''; $('#aiApplyBtn').disabled = true; return; }

    $('#aiImportPreview').innerHTML = `<table class="w-full text-xs whitespace-nowrap"><thead><tr class="text-left border-b"><th>反映</th><th>コード</th><th>年度</th><th class="text-right">年間配当</th><th class="text-right">配当性向</th><th class="text-right">自己株式数</th><th class="text-right">発行済株式数</th><th class="text-right">信頼度</th><th>根拠メモ</th></tr></thead><tbody>${rows}</tbody></table>`;
    $('#aiApplyBtn').disabled = false;
  };
  $('#aiExtractBtn').addEventListener('click', async ()=>{
    const f = $('#aiDocFile').files[0];
    if(!f){ alert('決算資料ファイルを選択してください'); return; }
    $('#aiImportStatus').textContent = 'AIで読み取り中...';
    $('#aiExtractBtn').disabled = true;
    try {
      pendingRows = await extractFinanceFromDocument(f, $('#aiDocCode').value.trim());
      $('#aiImportStatus').textContent = `${pendingRows.length}件の候補を抽出しました。内容を確認してから反映してください。`;
      renderPreview();
    } catch(e){ $('#aiImportStatus').innerHTML = `<span class="text-red-600">エラー：${e.message}</span>`; }
    finally { $('#aiExtractBtn').disabled = false; }
  });
  $('#aiApplyBtn').addEventListener('click', async ()=>{
    const checked = Array.from(document.querySelectorAll('#aiImportPreview input[type="checkbox"]:checked')).map(x=>pendingRows[Number(x.dataset.idx)]);
    if(!checked.length){ alert('反映する行を選択してください'); return; }
    try {
      const n = await saveExternalHistoryRows(checked);
      alert(`✅ ${n}銘柄分を補完データに反映しました`);
      $('#aiImportStatus').textContent = '反映済みです。銘柄分析画面を再表示するとグラフ・表に反映されます。';
    } catch(e){ alert('エラー：'+e.message); }
  });
}

/* ========== URL生成修正版（NotionのURL展開対策） ========== */
async function stooqLatest(code){
  const proxyUrl = await get('apiKeys','jquantsProxy');
  if(!proxyUrl) throw new Error('プロキシ未設定。⚙️設定タブで GAS Web App のURLを登録してください。');
  const stooqUrl = 'https://' + 'stooq.com/q/d/l/?s=' + encodeURIComponent(code + '.jp') + '&i=d';
  const r = await fetch(proxyUrl, {
    method:'POST',
    body: JSON.stringify({ url: stooqUrl })
  });
  if(!r.ok) throw new Error(`プロキシ通信エラー（Stooq）: ${r.status}`);
  const j = await r.json();
  if(j.error) throw new Error(`プロキシ（Stooq）: ${j.error}`);
  if(j.status >= 400) throw new Error(`Stooqエラー: ${j.status}`);
  const text = j.body || '';
  const lines = text.trim().split(/\r?\n/);
  if(lines.length < 2) return null;
  const last = lines[lines.length-1].split(',');
  return { date: last[0], close: parseFloat(last[4]) };
}

async function askGeminiParts(parts){
  const key = await get('apiKeys','gemini');
  if(!key) throw new Error('Gemini APIキー未設定');
  const url = 'https://' + 'generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + encodeURIComponent(key);
  const r = await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({contents:[{parts}]})
  });
  const j = await r.json();
  if(j.error) throw new Error(j.error.message || JSON.stringify(j.error));
  return j.candidates?.[0]?.content?.parts?.[0]?.text || '(応答なし)';
}

async function askGemini(prompt){
  const key = await get('apiKeys','gemini');
  if(!key) throw new Error('Gemini APIキー未設定');
  const url = 'https://' + 'generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + encodeURIComponent(key);
  const r = await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({contents:[{parts:[{text:prompt}]}]})
  });
  const j = await r.json();
  if(j.error) throw new Error(j.error.message || JSON.stringify(j.error));
  return j.candidates?.[0]?.content?.parts?.[0]?.text || '(応答なし)';
}
